<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Funding Rate History</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
  <h1>📈 Funding Rate History</h1>
  <p class="subtitle">История ставок финансирования: OKX + Hyperliquid</p>

  <div class="grid">
  {% for key, info in assets.items() %}
  <div class="card">
    <h2>{{ info.label }}</h2>
    <p id="status-{{ key }}" class="status">—</p>
    <div class="btn-row">
      <button class="btn green" onclick="syncAsset('{{ key }}')">&#x2B07; Собрать</button>
      <button class="btn blue" onclick="viewAsset('{{ key }}')">&#x1F441; Показать</button>
    </div>
    <div class="btn-row export-row">
      <span class="label">Скачать CSV:</span>
      <a class="btn yellow small" href="/api/export/{{ key }}.csv">Все</a>
      <a class="btn yellow small" href="/api/export/{{ key }}.csv?exchange=okx">OKX</a>
      <a class="btn yellow small" href="/api/export/{{ key }}.csv?exchange=hyperliquid">Hyperliquid</a>
    </div>
    <div class="btn-row">
      <a class="btn grey small" href="/api/stats/{{ key }}" target="_blank">&#x1F4CA; Годовой доход</a>
    </div>
  </div>
  {% endfor %}
  </div>

  <div id="viewer" style="display:none;margin-top:2rem">
    <h3 id="viewer-title"></h3>
    <div style="overflow-x:auto">
    <table>
      <thead>
        <tr>
          <th>exchange</th><th>asset</th><th>symbol</th>
          <th>datetime (UTC)</th><th>funding_rate</th>
          <th>rate %</th><th>premium</th>
        </tr>
      </thead>
      <tbody id="trows"></tbody>
    </table>
    </div>
  </div>
</div>
<script src="/static/app.js"></script>
</body>
</html>
